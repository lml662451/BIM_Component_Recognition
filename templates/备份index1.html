<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑图通 - 智能标注平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', '微软雅黑', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .layer-outer, .layer-middle, .black-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            backface-visibility: hidden;
            will-change: clip-path;
            transition: clip-path 0.9s cubic-bezier(0.25, 0.1, 0.25, 1) !important;
            overflow: hidden;
        }
        .black-layer {
            background: #1a1a1d;
            clip-path: polygon(0 0, 85% 0, 78% 100%, 0 100%);
            z-index: 5;
            transition-delay: 0s !important;
        }
        .black-layer.slide { clip-path: polygon(0 0, 28% 0, 18% 100%, 0 100%); }
        .black-layer.back { transition-delay: 0.2s !important; transition-duration: 1.5s !important; }
        .layer-middle {
            background: #8b1a30;
            clip-path: polygon(0 0, 85% 0, 78% 100%, 0 100%);
            z-index: 4;
            transition-delay: 0.1s !important;
        }
        .layer-middle.slide { clip-path: polygon(0 0, 28% 0, 18% 100%, 0 100%); }
        .layer-middle.back { transition-delay: 0.1s !important; transition-duration: 1.5s !important; }
        .layer-outer {
            background: #6a2238;
            clip-path: polygon(0 0, 85% 0, 78% 100%, 0 100%);
            z-index: 3;
            transition-delay: 0.2s !important;
        }
        .layer-outer.slide { clip-path: polygon(0 0, 28% 0, 18% 100%, 0 100%); }
        .layer-outer.back { transition-delay: 0s !important; transition-duration: 1.5s !important; }

        .main-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #c92a44 0%, #8b1a30 100%);
            z-index: 2;
            overflow: hidden;
        }

        .side-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 24%;
            height: 100%;
            padding: 25px;
            z-index: 6;
            display: flex;
            flex-direction: column;
        }
        .custom-logo img { max-width: 240px; height: auto; }
        .features { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 20px; }
        .feature { display: flex; align-items: center; gap: 15px; }
        .feature-icon {
            width: 28px;
            height: 28px;
            stroke: #fff;
            stroke-width: 1.5;
            fill: none;
            flex-shrink: 0;
        }
        .feature p { font-size: 14px; color: #e0e0e0; }

        .btn-start {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: transparent;
            border: 2px solid #1a1a1d;
            color: #1a1a1d;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 6;
        }
        .btn-start:hover { background: #1a1a1d; color: #c92a44; }
        .btn-back {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            display: none;
            z-index: 6;
        }

        .carousel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-left: 43%;
            box-sizing: border-box;
        }
        .carousel-container.show {
            opacity: 1;
            pointer-events: all;
        }

        .carousel-stage {
            position: relative;
            width: 1500px;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-item {
            position: absolute;
            width: 224px;
            height: 570px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 
                inset 0 0 35px rgba(255,255,255,0.1),
                0 15px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 38px;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(4px);
            opacity: 0.85;
            z-index: 1;
        }

        .carousel-item.active {
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                inset 0 0 50px rgba(255,255,255,0.15),
                0 25px 50px rgba(0, 0, 0, 0.6);
            opacity: 1;
            z-index: 10;
        }

        .carousel-item.hover-active {
            border: 3px solid transparent;
            border-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-image-slice: 1;
            box-shadow: 
                inset 0 0 50px rgba(79, 172, 254, 0.2),
                0 25px 50px rgba(0, 0, 0, 0.7);
            opacity: 1;
            z-index: 20;
        }

        .carousel-item:active {
            transform: translate(-50%, -50%) scale(0.98) !important;
            transition: transform 0.1s ease;
        }

        .carousel-icon {
            width: 96px;
            height: 96px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            transition: transform 0.4s ease;
            opacity: 0.9;
        }
        .carousel-item:hover .carousel-icon {
            transform: scale(1.05);
        }
        .carousel-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            color: #CCCCCC;
        }

        .carousel-controls {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="black-layer" id="blackLayer"></div>
        <div class="layer-middle" id="layerMiddle"></div>
        <div class="layer-outer" id="layerOuter"></div>
        <div class="main-area"></div>

        <div class="side-content">
            <div class="custom-logo">
                <img src="D:/BIM_Component_Recognition/static/logo1.png" alt="建筑图通">
            </div>
            <div class="features">
                <div class="feature">
                    <svg class="feature-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <path d="M12 6v6l4 2" stroke="#fff" stroke-width="1.5" fill="none"/>
                    </svg>
                    <p>操作简单便捷，轻松上手无难度</p>
                </div>
                <div class="feature">
                    <svg class="feature-icon" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="12" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <path d="M3 15h18" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="20" r="1" fill="#fff"/>
                    </svg>
                    <p>无需复杂安装，打开浏览器即可使用</p>
                </div>
                <div class="feature">
                    <svg class="feature-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="8" r="4" stroke="#fff" stroke-width="1.5" fill="none"/>
                    </svg>
                    <p>数据安全可靠，保护你的图纸隐私</p>
                </div>
                <div class="feature">
                    <svg class="feature-icon" viewBox="0 0 24 24">
                        <path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <path d="M12 16v-4" stroke="#fff" stroke-width="1.5" fill="none"/>
                        <circle cx="12" cy="8" r="1" fill="#fff"/>
                    </svg>
                    <p>适配行业规范，满足专业需求</p>
                </div>
            </div>
        </div>

        <button class="btn-start" id="btnStart">开始使用</button>
        <button class="btn-back" id="btnBack">返回首页</button>

        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-stage" id="carouselStage"></div>
        </div>
    </div>

    <script>
        (function() {
            const blackLayer = document.getElementById('blackLayer');
            const layerMiddle = document.getElementById('layerMiddle');
            const layerOuter = document.getElementById('layerOuter');
            const btnStart = document.getElementById('btnStart');
            const btnBack = document.getElementById('btnBack');
            const layers = [blackLayer, layerMiddle, layerOuter];
            
            const carouselContainer = document.getElementById('carouselContainer');
            const stage = document.getElementById('carouselStage');

            const itemsData = [
                { img: "D:/BIM_Component_Recognition/static/4.png", title: "构件智能识别" },
                { img: "D:/BIM_Component_Recognition/static/5.png", title: "图纸流程检索" },
                { img: "D:/BIM_Component_Recognition/static/6.png", title: "资料智能解析" },
                { img: "D:/BIM_Component_Recognition/static/7.png", title: "云端数据存储" }
            ];

            const totalItems = itemsData.length;
            let activeIndex = 0;
            let autoPlayTimer = null;
            let isAnimating = false;
            let hoveredIndex = null;
            let isHovering = false;

            const baseWidth = 220;
            const scaleFactor = 1.2;
            const scaledWidth = baseWidth * scaleFactor;
            const visualGap = 19;
            const gapNormal = baseWidth + visualGap;
            const gapMixed = (scaledWidth / 2) + visualGap + (baseWidth / 2);

            function renderCards() {
                stage.innerHTML = '';
                itemsData.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.className = 'carousel-item';
                    card.setAttribute('data-index', idx);
                    card.innerHTML = `
                        <img src="${item.img}" alt="${item.title}" class="carousel-icon">
                        <div class="carousel-title">${item.title}</div>
                    `;
                    stage.appendChild(card);
                });
            }

            function updateCardsPosition(targetActiveIndex = activeIndex, targetHoverIndex = hoveredIndex) {
                const cards = document.querySelectorAll('.carousel-item');
                if (cards.length === 0) return;

                const activeForScale = targetHoverIndex !== null ? targetHoverIndex : targetActiveIndex;
                const positions = [];
                for (let i = 0; i < totalItems; i++) {
                    let offset = i - targetActiveIndex;
                    if (offset > 1) offset -= totalItems;
                    if (offset < -2) offset += totalItems;
                    positions[i] = { offset, x: 0 };
                }

                let minOffset = Math.min(...positions.map(p => p.offset));
                let startIdx = positions.findIndex(p => p.offset === minOffset);
                let currentX = 0;
                let currentIdx = startIdx;
                
                for (let step = 0; step < totalItems; step++) {
                    positions[currentIdx].x = currentX;
                    
                    if (step < totalItems - 1) {
                        let nextIdx = (currentIdx + 1) % totalItems;
                        const isCurrentScaled = (currentIdx === activeForScale);
                        const isNextScaled = (nextIdx === activeForScale);
                        let gap;
                        if (isCurrentScaled || isNextScaled) {
                            gap = gapMixed;
                        } else {
                            gap = gapNormal;
                        }
                        currentX += gap;
                    }
                    currentIdx = (currentIdx + 1) % totalItems;
                }

                const centerIdx = positions.findIndex(p => p.offset === 0);
                const centerX = positions[centerIdx].x;
                const stageCenter = 0;
                const shift = stageCenter - centerX;

                cards.forEach((card, idx) => {
                    const pos = positions[idx];
                    const translateX = pos.x + shift;
                    const shouldScale = (idx === activeForScale);
                    
                    if (shouldScale) {
                        card.style.transform = `translate(-50%, -50%) translateX(${translateX}px) scale(${scaleFactor})`;
                        card.style.opacity = '1';
                        card.style.zIndex = 20;
                        
                        if (idx === targetHoverIndex) {
                            card.classList.add('hover-active');
                        } else {
                            card.classList.remove('hover-active');
                        }
                        
                        if (idx === targetActiveIndex && targetHoverIndex === null) {
                            card.classList.add('active');
                        } else {
                            card.classList.remove('active');
                        }
                    } else {
                        card.style.transform = `translate(-50%, -50%) translateX(${translateX}px) scale(1)`;
                        card.style.opacity = '0.85';
                        card.classList.remove('active', 'hover-active');
                        const absOffset = Math.abs(pos.offset);
                        card.style.zIndex = absOffset === 1 ? 5 : 1;
                    }
                });
            }

            function nextSlide() {
                if (isAnimating || !carouselContainer.classList.contains('show') || isHovering) return;
                isAnimating = true;
                activeIndex = (activeIndex + 1) % totalItems;
                updateCardsPosition(activeIndex, null);
                setTimeout(() => {
                    isAnimating = false;
                }, 1200);
            }

            function handleMouseEnter(index) {
                if (!carouselContainer.classList.contains('show')) return;
                stopAutoPlay();
                isHovering = true;
                hoveredIndex = index;
                updateCardsPosition(activeIndex, index);
            }

            function handleMouseLeave() {
                if (!carouselContainer.classList.contains('show')) return;
                isHovering = false;
                hoveredIndex = null;
                updateCardsPosition(activeIndex, null);
                startAutoPlay();
            }

            function startAutoPlay() {
                stopAutoPlay();
                autoPlayTimer = setInterval(() => {
                    if (!isAnimating && !isHovering) {
                        nextSlide();
                    }
                }, 2500);
            }

            function stopAutoPlay() {
                if (autoPlayTimer) {
                    clearInterval(autoPlayTimer);
                    autoPlayTimer = null;
                }
            }

            btnStart.addEventListener('click', () => {
                layers.forEach(layer => layer.classList.remove('back'));
                blackLayer.classList.add('slide');
                layerMiddle.classList.add('slide');
                layerOuter.classList.add('slide');
                btnStart.style.display = 'none';
                btnBack.style.display = 'block';
                
                activeIndex = 0;
                hoveredIndex = null;
                isHovering = false;
                
                renderCards();
                carouselContainer.classList.add('show');
                
                setTimeout(() => {
                    const cards = document.querySelectorAll('.carousel-item');
                    cards.forEach((card, idx) => {
                        card.addEventListener('mouseenter', () => handleMouseEnter(idx));
                        card.addEventListener('mouseleave', handleMouseLeave);
                    });
                    updateCardsPosition(activeIndex, null);
                }, 50);
                
                startAutoPlay();
            });

            btnBack.addEventListener('click', () => {
                carouselContainer.classList.remove('show');
                layers.forEach(layer => layer.classList.add('back'));
                blackLayer.classList.remove('slide');
                layerMiddle.classList.remove('slide');
                layerOuter.classList.remove('slide');
                stopAutoPlay();
                
                const cards = document.querySelectorAll('.carousel-item');
                cards.forEach(card => {
                    card.removeEventListener('mouseenter', handleMouseEnter);
                    card.removeEventListener('mouseleave', handleMouseLeave);
                });
                
                setTimeout(() => {
                    layers.forEach(layer => layer.classList.remove('back'));
                    stage.innerHTML = '';
                }, 800);
                
                btnBack.style.display = 'none';
                btnStart.style.display = 'block';
            });

            stage.addEventListener('click', (e) => {
                const card = e.target.closest('.carousel-item');
                if (!card || isAnimating) return;
                
                const index = parseInt(card.getAttribute('data-index'));
                if (index === activeIndex && !isHovering) {
                    const title = itemsData[index].title;
                    alert(`${title}功能已触发`);
                } else if (isHovering && index === hoveredIndex) {
                    const title = itemsData[index].title;
                    alert(`${title}功能已触发`);
                } else {
                    stopAutoPlay();
                    activeIndex = index;
                    hoveredIndex = null;
                    isHovering = false;
                    updateCardsPosition(activeIndex, null);
                    startAutoPlay();
                }
            });
        })();
    </script>
</body>
</html>
